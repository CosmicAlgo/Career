name: Security Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install pip-audit
        run: pip install pip-audit
      
      - name: Run pip-audit
        working-directory: ./backend
        run: |
          pip-audit --requirement requirements.txt --format=json --output=audit-report.json || true
          pip-audit --requirement requirements.txt

  npm-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  security-summary:
    name: Security Summary
    needs: [gitleaks, pip-audit, npm-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Security Summary
        run: |
          echo "## 🔒 Security Audit Summary"
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| Gitleaks Secrets Scan | ${{ needs.gitleaks.result == 'success' && '✅ Passed' || '❌ Failed' }} |"
          echo "| pip-audit (Python) | ${{ needs.pip-audit.result == 'success' && '✅ Passed' || '⚠️ Check Required' }} |"
          echo "| npm audit (Node.js) | ${{ needs.npm-audit.result == 'success' && '✅ Passed' || '⚠️ Check Required' }} |"
          echo ""
          echo "**Note:** If Gitleaks finds secrets, the PR will be blocked from merging."
