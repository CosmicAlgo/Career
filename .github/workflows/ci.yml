name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend Python Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check Python syntax
      working-directory: ./backend
      run: |
        python -m py_compile $(find . -name "*.py" -type f | grep -v __pycache__ | grep -v .venv)
    
    - name: Run import checks
      working-directory: ./backend
      run: |
        python -c "from api.routes import router; print('API routes import: OK')"
        python -c "from database.queries import DatabaseQueries; print('Database queries import: OK')"
        python -c "from pipeline.daily_runner import run_daily_pipeline; print('Pipeline import: OK')"
        python -c "from assessment.ai_router import get_ai_client; print('AI router import: OK')"

  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
      env:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
